#:schema https://schemas.spinframework.dev/spin/manifest-v2/latest.json

spin_manifest_version = 2

[application]
name = "grpc"
version = "0.1.0"
authors = ["The Spin authors"]
description = "An example gRPC application using tonic"

[[trigger.http]]
route = "/..."
component = "grpc"

[component.grpc]
source = "../../target/wasm32-wasip2/release/grpc.wasm"
allowed_outbound_hosts = []
[component.grpc.build]
command = "cargo build --target wasm32-wasip2 --release"
watch = ["src/**/*.rs", "Cargo.toml", "proto/**/*.proto"]
