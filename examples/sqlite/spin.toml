spin_manifest_version = 2

[application]
authors = ["The Spin authors"]
description = "A simple application that exercises SQLite storage."
name = "spin-sqlite"
version = "1.0.0"

[[trigger.http]]
route = "/..."
component = "sqlite"

[component.sqlite]
source = "../../target/wasm32-wasip2/release/rust_sqlite.wasm"
sqlite_databases = ["default"]
[component.sqlite.build]
command = "cargo build --target wasm32-wasip2 --release"
